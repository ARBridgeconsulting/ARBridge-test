<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-label="Organisationsdiagram HK Hovedstaden">
  <defs>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}.h{font-size:24px;font-weight:700}.p{font-size:16px}.s{font-size:14px;fill:#334155}
      .b{fill:#eff6ff;stroke:#1d4ed8;stroke-width:2}.b2{fill:#f8fafc;stroke:#64748b;stroke-width:2}
      .l{stroke:#1d4ed8;stroke-width:2.5}
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="50" y="60" class="t h">HK Hovedstaden – organisationsdiagram (redaktionel visualisering)</text>
  <text x="50" y="90" class="t s">Baset på hk.dk: organisationen + HK Hovedstaden + hovedbestyrelsen. Besøgt 2026-03-04.</text>

  <rect x="520" y="130" rx="16" ry="16" width="360" height="110" class="b"/>
  <text x="700" y="172" text-anchor="middle" class="t p">HK Danmark</text>
  <text x="700" y="198" text-anchor="middle" class="t s">Kongres og hovedbestyrelse</text>

  <rect x="520" y="300" rx="16" ry="16" width="360" height="110" class="b"/>
  <text x="700" y="342" text-anchor="middle" class="t p">HK Hovedstaden</text>
  <text x="700" y="368" text-anchor="middle" class="t s">Repræsentantskab (171 medlemmer)</text>

  <line x1="700" y1="240" x2="700" y2="300" class="l"/>

  <rect x="100" y="500" rx="14" ry="14" width="220" height="92" class="b2"/>
  <text x="210" y="545" text-anchor="middle" class="t s">HK Handel</text>

  <rect x="350" y="500" rx="14" ry="14" width="220" height="92" class="b2"/>
  <text x="460" y="545" text-anchor="middle" class="t s">HK IMI</text>

  <rect x="600" y="500" rx="14" ry="14" width="220" height="92" class="b2"/>
  <text x="710" y="545" text-anchor="middle" class="t s">HK Kommunal</text>

  <rect x="850" y="500" rx="14" ry="14" width="220" height="92" class="b2"/>
  <text x="960" y="545" text-anchor="middle" class="t s">HK Service</text>

  <rect x="1100" y="500" rx="14" ry="14" width="220" height="92" class="b2"/>
  <text x="1210" y="545" text-anchor="middle" class="t s">HK Stat</text>

  <line x1="700" y1="410" x2="210" y2="500" class="l"/>
  <line x1="700" y1="410" x2="460" y2="500" class="l"/>
  <line x1="700" y1="410" x2="710" y2="500" class="l"/>
  <line x1="700" y1="410" x2="960" y2="500" class="l"/>
  <line x1="700" y1="410" x2="1210" y2="500" class="l"/>

  <rect x="480" y="670" rx="14" ry="14" width="440" height="110" class="b2"/>
  <text x="700" y="712" text-anchor="middle" class="t p">Ledelsesprofil (eksempel)</text>
  <text x="700" y="738" text-anchor="middle" class="t s">Peter Jacques Jensen – Forperson, HK Hovedstaden</text>
</svg>
